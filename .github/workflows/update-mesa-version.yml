name: Update Mesa Version

on:
  workflow_dispatch:  # Triggered by main workflow

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new version
        id: check_version
        run: |
          # Get current commit from spec file
          CURRENT_COMMIT=$(grep -oP '^%define commit \K[a-f0-9]+' mesa-git/mesa.spec)
          echo "Current commit: $CURRENT_COMMIT"
          
          # Get latest commit from GitLab API
          LATEST_COMMIT=$(curl -s "https://gitlab.freedesktop.org/api/v4/projects/mesa%2Fmesa/repository/commits" | jq -r '.[0].id')
          LATEST_SHORT=$(echo $LATEST_COMMIT | cut -c1-7)
          COMMIT_DATE=$(date '+%Y%m%d.%H')
          
          echo "Latest commit: $LATEST_COMMIT"
          echo "Short commit: $LATEST_SHORT"
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "latest_short=$LATEST_SHORT" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          
          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update spec file
        if: steps.check_version.outputs.update_needed == 'true'
        run: |
          COMMIT="${{ steps.check_version.outputs.latest_commit }}"
          SHORT="${{ steps.check_version.outputs.latest_short }}"
          DATE="${{ steps.check_version.outputs.commit_date }}"
          
          # Update commit hash
          sed -i "s/^%define commit .*/%define commit $COMMIT/" mesa-git/mesa.spec
          
          # Update commit date
          sed -i "s/^%global commit_date .*/%global commit_date $DATE/" mesa-git/mesa.spec
          
          # Increment release number
          CURRENT_RELEASE=$(grep -oP '^Release:\s+0\.\K[0-9]+' mesa-git/mesa.spec)
          NEW_RELEASE=$((CURRENT_RELEASE + 1))
          sed -i "s/^Release:\s\+0\.[0-9]\+%/Release:        0.$NEW_RELEASE%/" mesa-git/mesa.spec
          
          echo "Updated spec file to commit $SHORT, release 0.$NEW_RELEASE"

      - name: Commit and push changes
        if: steps.check_version.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mesa-git/mesa.spec
          git commit -m "chore(mesa-git): update to commit ${{ steps.check_version.outputs.latest_short }}"
          git push
